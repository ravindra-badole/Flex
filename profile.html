<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - SkillBridge</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="dashboard">
  <div class="sidebar">
    <h2>SkillBridge</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="profile.html">My Profile</a></li>
      <li><a href="mygigs.html">My Gigs</a></li>
      <li><a href="post-job.html">Post Job</a></li>
      <li><a href="browse-jobs.html">Browse Jobs</a></li>
      <li><a href="orders.html">Orders</a></li>
      <li><a href="messages.html">Messages</a></li>
      <li><a href="notifications.html">Notifications</a></li>
      <li><a href="settings.html">Settings</a></li>
      <li><a href="help.html">Help</a></li>
      <li class="logout-item"><a href="index.html">Logout</a></li>
    </ul>
  </div>

  <div class="main" style="padding: 40px;">
    <div class="topbar">
      <a href="dashboard.html" class="back-arrow">&larr;</a>
      <h3>My Profile</h3>
      <img class="user-dp" alt="User DP">
    </div>

    <div class="profile-card">
      <div class="dp-section">
        <img class="user-dp profile-dp" alt="User DP">
        <div class="dp-controls">
          <label for="dpUpload" class="upload-btn">Upload DP</label>
          <input type="file" id="dpUpload" accept="image/*">
          <button type="button" class="secondary-btn" onclick="clearDp()">Remove DP</button>
        </div>
      </div>
      <h2>Jane Doe</h2>
      <p>Freelancer | Web Developer | UI/UX Designer</p>

      <form id="profileEditForm" class="profile-edit-form">
        <div class="profile-details">
          <div>
            <label for="profileFullName"><strong>Full Name</strong></label>
            <input id="profileFullName" type="text" name="full_name" required>
          </div>
          <div>
            <label for="profileEmail"><strong>Email</strong></label>
            <input id="profileEmail" type="email" name="email" required>
          </div>
          <div>
            <label for="profileLocation"><strong>Location</strong></label>
            <input id="profileLocation" type="text" name="location" placeholder="City, Country">
          </div>
          <div>
            <label for="profileSkills"><strong>Skills / Hiring Needs</strong></label>
            <input id="profileSkills" type="text" name="skills" placeholder="React, Design, Marketing">
          </div>
          <div>
            <label for="profileAbout"><strong>About Me</strong></label>
            <textarea id="profileAbout" name="about" rows="4" placeholder="Tell clients or freelancers about yourself"></textarea>
          </div>
          <div class="inline-check">
            <label>
              <input type="checkbox" name="email_updates">
              Receive email updates
            </label>
          </div>
        </div>

        <div class="actions" style="margin-top: 30px;">
          <button type="submit">Save Profile</button>
          <button type="button" class="secondary-btn" id="profileRoleAction">View My Gigs</button>
        </div>
      </form>
    </div>
  </div>
</div>

  <script src="user-dp.js"></script>
  <script src="app.js"></script>
</body>
</html>
