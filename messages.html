<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - SkillBridge</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="dashboard">
  <div class="sidebar">
    <h2>SkillBridge</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="profile.html">My Profile</a></li>
      <li><a href="mygigs.html">My Gigs</a></li>
      <li><a href="post-job.html">Post Job</a></li>
      <li><a href="browse-jobs.html">Browse Jobs</a></li>
      <li><a href="orders.html">Orders</a></li>
      <li><a href="messages.html">Messages</a></li>
      <li><a href="notifications.html">Notifications</a></li>
      <li><a href="settings.html">Settings</a></li>
      <li><a href="help.html">Help</a></li>
      <li class="logout-item"><a href="index.html">Logout</a></li>
    </ul>
  </div>

  <div class="main" style="padding: 40px;">
    <div class="topbar">
      <a href="dashboard.html" class="back-arrow">←</a>
      <h3>Messages</h3>
      <img class="user-dp" alt="User DP">
    </div>

    <div class="profile-card">
      <h2>Inbox</h2>
      <p>See conversation-style updates from clients and applications across your workspace.</p>

      <div id="messagesList" class="message-list"></div>

      <form id="messageComposer" class="inline-form" style="margin-top: 30px;">
        <select name="application_id" aria-label="Accepted project chat"></select>
        <textarea name="message" rows="4" placeholder="Write a project message"></textarea>
        <label class="file-field">
          <span>Attach file</span>
          <input type="file" name="attachment">
        </label>
        <div class="actions">
          <button type="submit">Send Message</button>
          <a class="secondary-btn action-link" href="orders.html">Open Orders</a>
        </div>
      </form>
    </div>
  </div>
</div>

  <script src="user-dp.js"></script>
  <script src="app.js?v=unread-messages-1"></script>
</body>
</html>
