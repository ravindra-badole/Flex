<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SkillBridge</title>
  <link rel="stylesheet" href="signup.css">
</head>

<body>

<div class="container">
  <div class="signup-box">

    <a href="index.html" class="back-home">← Back to Home</a>

    <h2>Create Account</h2>

    <!-- Social -->
    <button class="google-btn">Continue with Google</button>
    <button class="facebook-btn">Continue with Facebook</button>

    <div class="divider">OR</div>

    <!-- Form -->
    <form action="login.html">
      <input type="text" name="first_name" placeholder="First Name" required>
      <input type="text" name="last_name" placeholder="Last Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>

      <label class="terms">
        <input type="checkbox" name="terms" required> I agree to Terms & Conditions
      </label>

      <button type="submit" class="signup-btn">Join Now</button>
    </form>

    <p class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </p>

  </div>
</div>

  <script src="app.js"></script>
</body>
</html>
