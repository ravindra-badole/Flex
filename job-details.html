  <meta charset="UTF-8">

</head>
<body>

<div class="dashboard">
  <div class="sidebar">
    <h2>SkillBridge</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="profile.html">My Profile</a></li>
      <li><a href="mygigs.html">My Gigs</a></li>
      <li><a href="post-job.html">Post Job</a></li>
      <li><a href="browse-jobs.html">Browse Jobs</a></li>

    </ul>

      <a href="dashboard.html" class="back-arrow">&larr;</a>
      <h3>Job Details</h3>
      <img class="user-dp" alt="User DP">
    </div>

    <div class="profile-card">

      <p id="jobStatus" class="muted-line"></p>

      <div class="actions" style="margin-top: 30px;">
        <button id="jobApplyButton" type="button">Apply Now</button>
        <a class="secondary-btn action-link" href="browse-jobs.html">Back to Browse Jobs</a>
